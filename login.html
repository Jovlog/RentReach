<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentReach - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

<div class="login-wrap">
  <div class="login-logo">
    <h1>Rent<span>Reach</span></h1>
    <p>Sign in to your account</p>
  </div>

  <div id="errorMessage" class="login-err"></div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
  </div>

  <button class="btn btn-primary btn-full" id="btnLogin">Sign In</button>

  <div class="login-footer" style="margin-top:18px;padding-top:14px;border-top:1px solid #e2e8f0;color:#94a3b8;font-size:12px;text-align:center;">
    🔒 Account registration is done through the <strong>RentReach mobile app</strong> only.
  </div>
</div>

<script type="module" src="login-script.js"></script>
</body>
</html>
