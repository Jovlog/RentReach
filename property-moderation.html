<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Moderation – RentReach Admin</title>
<link rel="stylesheet" href="styles.css">
<style>
    /* ── Property Card Grid ── */
    #propertyList {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        padding: 10px 0;
    }
    .property-card { background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 3px 12px rgba(0,0,0,0.1); display:flex; flex-direction:column; transition:transform 0.2s,box-shadow 0.2s; }
    .property-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,0.15); }
    .property-img-wrapper { width:100%; height:180px; background:#eef0f3; position:relative; overflow:hidden; }
    .property-img { width:100%; height:100%; object-fit:cover; display:block; }
    .property-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:14px; color:#aaa; background:#f0f2f5; }
    .property-details { padding:14px 16px 8px; flex:1; }
    .property-title { font-size:16px; font-weight:600; margin:0 0 6px; color:#1e2a38; }
    .property-address { font-size:13px; color:#555; margin:4px 0; }
    .property-price { font-size:15px; font-weight:700; color:#27ae60; margin:6px 0 4px; }
    .property-landlord { font-size:12px; color:#888; margin:2px 0; }
    .property-actions { padding:10px 16px 14px; display:flex; justify-content:flex-end; }
    .btn-delete { padding:7px 16px; background:#e74c3c; color:white; border:none; border-radius:6px; font-size:13px; cursor:pointer; transition:background 0.2s; }
    .btn-delete:hover { background:#c0392b; }
</style>
</head>

<!-- BUG FIX: Removed undefined .admin-body class. Replaced broken ul/li sidebar
     with the direct <a> structure the CSS expects. Added navbar and proper layout wrapper. -->

  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Management</div>
    <a href="user-management.html">👥 User Management</a>
    <a href="property-moderation.html" class="active">🏢 Property Moderation</a>
    <div class="sidebar-label">Account</div>
    <a href="profile.html">👤 Profile</a>
  </div>

  <div class="main">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div>
        <div class="page-title">Property Moderation</div>
        <div class="page-subtitle">Review and remove listings</div>
      </div>
    </div>

    <div id="propertyList">
      <p style="color:#aaa;">Loading properties…</p>
    </div>
  </div>
</div>
